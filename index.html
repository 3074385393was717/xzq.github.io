<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>肩关节康复训练系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f7f9fc;padding:20px;max-width:800px;margin:0 auto}
h1{text-align:center;color:#2c3e52;margin-bottom:24px}
.part{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.part h2{font-size:18px;color:#34495e;margin-bottom:12px}
.btn{display:inline-block;padding:10px 16px;background:#3498db;color:white;border-radius:8px;margin-right:8px;margin-bottom:8px;border:none;cursor:pointer}
.btn.active{background:#27ae60}
.training{margin-top:24px}
.item{background:white;padding:16px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.05);margin-bottom:12px}
.item h3{color:#2c3e50;margin-bottom:8px}
.item p{color:#555}
</style>
</head>
<body>
<h1>肩关节康复训练系统</h1>

<div class="part">
<h2>选择训练部位</h2>
<button class="btn active">肩关节</button>
<button class="btn">肘关节</button>
<button class="btn">腕关节</button>
</div>

<div class="part">
<h2>选择难度</h2>
<button class="btn active">基础</button>
<button class="btn">进阶</button>
<button class="btn">强化</button>
</div>

<div class="training">
<div class="item">
<h3>训练一：肩部绕环（10次）</h3>
<p>自然站立，肩部缓慢向前、向上、向后绕环，动作轻柔，保持呼吸均匀。</p >
</div>
<div class="item">
<h3>训练二：墙壁爬手（5分钟）</h3>
<p>面对墙壁站立，手指缓慢向上爬行，至轻微牵拉感后停留，再缓慢下落。</p >
</div>
</div>

</body>
</html>
