<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>骨折AI检测系统 Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        #canvasContainer { position: relative; display: inline-block; }
        #uploadCanvas { border: 2px dashed #ccc; cursor: crosshair; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ko">한국어</option>
        </select>

        <h1 data-i18n="title">骨折AI检测系统</h1>

        <div class="controls">
            <input type="file" id="imageLoader" accept="image/*">
            <button onclick="startAnalysis()" data-i18n="analyzeBtn">开始分析</button>
        </div>

        <div id="canvasContainer">
            <canvas id="uploadCanvas"></canvas>
        </div>
    </div>

    <script>
        // 多语言数据
        const dict = {
            "zh": { "title": "骨折AI检测系统", "analyzeBtn": "开始分析" },
            "en": { "title": "Fracture AI Detection System", "analyzeBtn": "Start Analysis" },
            "ko": { "title": "골절 AI 진단 시스템", "analyzeBtn": "분석 시작" }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = dict[lang][el.getAttribute('data-i18n')];
            });
        }

        // 图片上传与预览
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('uploadCanvas');
        const ctx = canvas.getContext('2d');

        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // 模拟AI分析后的标注（演示功能）
        function startAnalysis() {
            // 假设这是AI返回的病变坐标 [x, y, w, h]
            const mockData = { x: 50, y: 50, w: 200, h: 150 };
            
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 5;
            ctx.strokeRect(mockData.x, mockData.y, mockData.w, mockData.h);
            
            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.fillRect(mockData.x, mockData.y, mockData.w, mockData.h);
            alert("分析完成！病变区域已标注。");
        }
    </script>
</body>
</html>
